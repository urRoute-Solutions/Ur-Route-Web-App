<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="#1B2D78"/>

  <!-- Subtle inner gradient effect -->
  <rect width="512" height="512" rx="114" fill="url(#innerGrad)" opacity="0.15"/>
  <defs>
    <radialGradient id="innerGrad" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- U-curve route path -->
  <path d="M128 193 C128 400 384 400 384 193" stroke="white" stroke-width="36" stroke-linecap="round" fill="none"/>

  <!-- Origin dot (white) -->
  <circle cx="128" cy="147" r="46" fill="white"/>

  <!-- Destination dot (green) -->
  <circle cx="384" cy="147" r="58" fill="#16A34A"/>

  <!-- Arrow inside destination dot -->
  <path d="M362 168 L384 125 L406 168" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- "urRoute" wordmark below icon at large size -->
  <text x="256" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">urRoute</text>
</svg>
