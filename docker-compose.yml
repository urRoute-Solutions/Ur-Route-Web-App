version: "3.9"

services:
  web:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - redis

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
